name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What limitation does it address?
      placeholder: Describe the problem you're facing...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see implemented to solve this problem?
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions or workarounds have you considered?
      placeholder: Describe any alternatives you've tried or considered...

  - type: dropdown
    id: feature_type
    attributes:
      label: Feature Type
      description: What type of feature is this?
      options:
        - New functionality
        - Enhancement to existing feature
        - Performance improvement
        - UI/UX improvement
        - Documentation improvement
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical - Must have
        - High - Should have
        - Medium - Nice to have
        - Low - Would be nice
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would you use this feature? Please provide specific examples.
      placeholder: Describe how you would use this feature...

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What would make this feature successful? How would we know it's complete?
      placeholder: |
        - [ ] User can access the new feature
        - [ ] Feature works with existing functionality
        - [ ] Performance meets requirements

  - type: textarea
    id: technical_details
    attributes:
      label: Technical Details (Optional)
      description: Any technical considerations or implementation suggestions?
      placeholder: Share any technical thoughts or implementation ideas...

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Screenshots (Optional)
      description: If you have any mockups or screenshots, please attach them.
      placeholder: Drag and drop images here or click to attach

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      description: Please confirm the following
      options:
        - label: I have searched existing issues for similar requests
          required: true
        - label: I have provided all the requested information
          required: true
        - label: This feature request is within the scope of this project
          required: true
