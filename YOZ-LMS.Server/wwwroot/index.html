<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOZ-LMS - Akıllı Öğrenme Yönetim Sistemi</title>
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>

<body>
    <div id="app">
        <!-- Loading Screen -->
        <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50 flex items-center justify-center">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-lg font-medium text-gray-700">YOZ-LMS yükleniyor...</p>
            </div>
        </div>
    </div>

    <script>
        // Simple HTML/JS implementation
        const app = {
            searchQuery: '',
            selectedLanguage: 'Turkish',
            selectedLevel: 'Beginner',
            isLoading: false,
            errorMessage: '',
            learningResponse: null,
            questionAnswers: {},
            feedbackMessages: {},

            supportedLanguages: [
                'Turkish', 'English', 'German', 'French', 'Spanish', 'Italian',
                'Portuguese', 'Russian', 'Japanese', 'Korean', 'Chinese', 'Arabic',
                'Hindi', 'Greek', 'Polish', 'Swedish', 'Norwegian', 'Finnish', 
                'Danish', 'Dutch'
            ],

            supportedLevels: ['Beginner', 'Intermediate', 'Advanced', 'Expert'],

            async generateContent() {
                if (!this.searchQuery.trim()) {
                    this.errorMessage = 'Lütfen bir arama sorgusu girin.';
                    this.render();
                    return;
                }

                this.isLoading = true;
                this.errorMessage = '';
                this.learningResponse = null;
                this.questionAnswers = {};
                this.feedbackMessages = {};
                this.render();

                try {
                    const response = await fetch('/api/learning/generate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            prompt: this.searchQuery,
                            language: this.selectedLanguage,
                            level: this.selectedLevel
                        })
                    });

                    if (response.ok) {
                        this.learningResponse = await response.json();
                    } else {
                        const errorText = await response.text();
                        this.errorMessage = `API Hatası: ${response.status} - ${errorText}`;
                    }
                } catch (ex) {
                    this.errorMessage = `Hata: ${ex.message}`;
                } finally {
                    this.isLoading = false;
                    this.render();
                }
            },

            checkAnswer(questionKey, correctAnswer) {
                const userAnswer = this.questionAnswers[questionKey] || '';
                const isCorrect = userAnswer.trim().toLowerCase() === correctAnswer.trim().toLowerCase();

                this.feedbackMessages[questionKey] = {
                    isCorrect,
                    message: isCorrect ? '✅ Doğru cevap! Mükemmel!' : `❌ Yanlış cevap. Doğru cevap: ${correctAnswer}`
                };
                this.render();
            },

            checkMultipleChoice(questionKey, correctAnswerIndex) {
                const userAnswer = this.questionAnswers[questionKey] || '';
                const isCorrect = parseInt(userAnswer) === correctAnswerIndex;

                this.feedbackMessages[questionKey] = {
                    isCorrect,
                    message: isCorrect ? '✅ Doğru cevap! Mükemmel!' : `❌ Yanlış cevap. Doğru cevap: ${correctAnswerIndex}`
                };
                this.render();
            },

            render() {
                const app = document.getElementById('app');
                
                if (this.isLoading) {
                    app.innerHTML = `
                        <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50 flex items-center justify-center">
                            <div class="text-center">
                                <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                <p class="text-lg font-medium text-gray-700">İçerik oluşturuluyor...</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50">
                        <section class="py-20 px-4">
                            <div class="max-w-6xl mx-auto text-center">
                                <h1 class="text-6xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-4">
                                    YOZ-LMS
                                </h1>
                                <p class="text-xl text-gray-600 mb-8">Akıllı Öğrenme Yönetim Sistemi</p>
                                
                                <div class="max-w-2xl mx-auto mb-8">
                                    <div class="flex gap-2 p-2 bg-white rounded-2xl shadow-lg border border-gray-200">
                                        <input 
                                            type="text"
                                            class="flex-1 px-4 py-3 text-lg outline-none bg-transparent" 
                                            placeholder="Ne öğrenmek istersiniz?"
                                            value="${this.searchQuery}"
                                            onchange="app.searchQuery = this.value"
                                            onkeypress="if(event.key === 'Enter') app.generateContent()"
                                        />
                                        <button 
                                            class="px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-semibold hover:shadow-lg transition-all duration-200 flex items-center gap-2"
                                            onclick="app.generateContent()"
                                        >
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                            </svg>
                                            <span>Öğren</span>
                                        </button>
                                    </div>
                                </div>
                                
                                <div class="flex justify-center gap-6 flex-wrap">
                                    <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-lg shadow">
                                        <label class="text-sm font-medium text-gray-700">Dil:</label>
                                        <select class="px-3 py-1 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500" onchange="app.selectedLanguage = this.value">
                                            ${this.supportedLanguages.map(lang => `<option value="${lang}" ${lang === this.selectedLanguage ? 'selected' : ''}>${lang}</option>`).join('')}
                                        </select>
                                    </div>
                                    
                                    <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-lg shadow">
                                        <label class="text-sm font-medium text-gray-700">Seviye:</label>
                                        <select class="px-3 py-1 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500" onchange="app.selectedLevel = this.value">
                                            ${this.supportedLevels.map(level => `<option value="${level}" ${level === this.selectedLevel ? 'selected' : ''}>${level}</option>`).join('')}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </section>
                `;

                if (this.errorMessage) {
                    html += `
                        <section class="py-12">
                            <div class="max-w-4xl mx-auto">
                                <div class="bg-red-50 border border-red-200 rounded-2xl p-6">
                                    <div class="flex items-start gap-3">
                                        <div class="flex-shrink-0 w-6 h-6 text-red-600">
                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                        </div>
                                        <div class="flex-1">
                                            <h3 class="text-lg font-semibold text-red-800 mb-1">Hata</h3>
                                            <p class="text-red-700">${this.errorMessage}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    `;
                }

                if (this.learningResponse) {
                    html += `
                        <section class="py-12 px-4">
                            <div class="max-w-4xl mx-auto">
                                <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
                                    <div class="flex items-start justify-between mb-4">
                                        <h2 class="text-3xl font-bold text-gray-900">${this.learningResponse.results.content.header}</h2>
                                        <div class="flex gap-2">
                                            <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium">${this.learningResponse.language}</span>
                                            <span class="px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-sm font-medium">${this.learningResponse.level}</span>
                                        </div>
                                    </div>
                                    
                                    <div class="prose prose-lg max-w-none text-gray-700">
                                        ${this.learningResponse.results.content.detail}
                                    </div>
                                </div>
                    `;

                    if (this.learningResponse.results.content.questions) {
                        html += `
                            <div class="bg-white rounded-2xl shadow-lg p-8">
                                <h3 class="text-xl font-bold text-gray-900 mb-6">Test Soruları</h3>
                                <div class="space-y-6">
                        `;

                        Object.entries(this.learningResponse.results.content.questions).forEach(([key, question]) => {
                            html += `
                                <div class="border border-gray-200 rounded-xl p-6">
                                    <p class="text-lg font-medium text-gray-900 mb-4">${question.questionText}</p>
                            `;

                            if (question.answer) {
                                html += `
                                    <div class="space-y-3">
                                        <input 
                                            type="text" 
                                            class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                                            placeholder="Cevabınızı yazın..."
                                            onchange="app.questionAnswers['${key}'] = this.value"
                                        />
                                        <button 
                                            class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors"
                                            onclick="app.checkAnswer('${key}', '${question.answer}')"
                                        >
                                            Cevapla
                                        </button>
                                    </div>
                                `;
                            } else if (question.answers) {
                                html += `
                                    <div class="space-y-3">
                                        <div class="space-y-2">
                                `;
                                Object.entries(question.answers).forEach(([answerKey, answerValue]) => {
                                    html += `
                                        <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                                            <input 
                                                type="radio" 
                                                name="question-${key}" 
                                                value="${answerKey}" 
                                                class="w-4 h-4 text-blue-600"
                                                onchange="app.questionAnswers['${key}'] = this.value"
                                            />
                                            <span class="text-gray-700">${answerValue}</span>
                                        </label>
                                    `;
                                });
                                html += `
                                        </div>
                                        <button 
                                            class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors"
                                            onclick="app.checkMultipleChoice('${key}', ${question.correctAnswer})"
                                        >
                                            Cevapla
                                        </button>
                                    </div>
                                `;
                            }

                            if (this.feedbackMessages[key]) {
                                const feedback = this.feedbackMessages[key];
                                html += `
                                    <div class="mt-4 p-4 rounded-lg ${feedback.isCorrect ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">
                                        <div class="flex items-start gap-2">
                                            <div class="flex-shrink-0 w-5 h-5 ${feedback.isCorrect ? 'text-green-600' : 'text-red-600'}">
                                                ${feedback.isCorrect ? '✓' : '✗'}
                                            </div>
                                            <p class="${feedback.isCorrect ? 'text-green-800' : 'text-red-800'}">
                                                ${feedback.message}
                                            </p>
                                        </div>
                                    </div>
                                `;
                            }

                            html += `</div>`;
                        });

                        html += `
                                </div>
                            </div>
                        `;
                    }

                    html += `
                            </div>
                        </section>
                    `;
                }

                html += `</div>`;
                app.innerHTML = html;
            }
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            app.render();
        });
    </script>
</body>
</html>
